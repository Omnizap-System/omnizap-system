name: Security - Runner Hardening

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-runner-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Harden Runner Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Runner audit heartbeat
        run: echo "Runner hardening audit completed."
